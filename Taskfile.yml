# https://taskfile.dev
version: "3"

vars:
  UV: uv
  PY: "{{.UV}} run"
  DOCKER_IMAGE: biblewise
  DOCKER_TAG: latest
  DOCKER_USER: '{{.DOCKER_USER | default ""}}'
  DOCKER_REGISTRY: '{{.DOCKER_REGISTRY | default "docker.io"}}'
  DOCKER_FULL: "{{.DOCKER_REGISTRY}}/{{.DOCKER_USER}}/{{.DOCKER_IMAGE}}:{{.DOCKER_TAG}}"

tasks:
  default:
    desc: Run the app (ensure deps and DB exist first)
    cmds:
      - task: run

  deps:
    desc: Install dependencies with uv
    cmds:
      - "{{.UV}} sync"

  deps-dev:
    desc: Install dependencies including dev (pytest)
    cmds:
      - "{{.UV}} sync --extra dev"

  fetch:
    desc: Download KJV into bible.db (one-time or refresh)
    cmds:
      - "{{.PY}} python -m biblewise.fetch_bible"

  run:
    desc: Run Biblewise interactive menu
    cmds:
      - "{{.PY}} biblewise"

  test:
    desc: Run tests
    cmds:
      - "{{.PY}} pytest tests/ -v --tb=short"

  install:
    desc: Full first-time setup (deps + fetch)
    cmds:
      - task: deps
      - task: fetch

  dbuild:
    desc: Build Docker image
    cmds:
      - docker build -t {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} .

  drun:
    desc: Run Biblewise in a container
    cmds:
      - docker run -it {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}}

  dpush:
    desc: Tag and push image to registry (set DOCKER_USER env var)
    deps: [dbuild]
    preconditions:
      - sh: test -n "{{.DOCKER_USER}}"
        msg: "DOCKER_USER is required. Run: DOCKER_USER=yourname task dpush"
    cmds:
      - docker tag {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} {{.DOCKER_FULL}}
      - docker push {{.DOCKER_FULL}}
      - echo "Pushed {{.DOCKER_FULL}}"

  dup:
    desc: Build and run with docker-compose
    cmds:
      - docker-compose up --build
